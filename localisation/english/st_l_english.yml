l_english:
 st_enable_system: "Enable Surplus Trade"
 st_enable_system_desc: "Activate automatic resource balancing.\n\n§YResources above maximum§! thresholds will be sold for Trade Value.\n§GTrade Value§! will be spent to fill resources below desired thresholds.\n\nResources with the largest deficit are filled first."
 st_disable_system: "Disable Surplus Trade"
 st_disable_system_desc: "Deactivate automatic resource balancing.\n\nAll resource conversions will stop."
 st_event_10_title: "Surplus Trade"
 st_event_10_desc: "Automatic resource balancing has been §Genabled§!.\n\nConfigure per-resource thresholds in the Edicts panel."
 st_event_10_ok: "Understood"
 st_event_11_title: "Surplus Trade"
 st_event_11_desc: "Automatic resource balancing has been §Rdisabled§!.\n\nAll resource conversions have stopped."
 st_event_11_ok: "Understood"
 st_config_energy_min: "Energy: Set Minimum"
 st_config_energy_min_desc: "Set the energy emergency floor. Energy will never be sold below this amount.\n\n§YCurrent minimum:§! [Root.GetVariable|st_energy_min]\n§LClick to cycle to next tier.§!"
 st_config_energy_desired: "Energy: Set Desired"
 st_config_energy_desired_desc: "Set the target energy stockpile. Trade Value will be spent to buy energy when it falls below this level.\n\n§YCurrent desired:§! [Root.GetVariable|st_energy_desired]\n§LClick to cycle to next tier.§!"
 st_config_energy_max: "Energy: Set Maximum"
 st_config_energy_max_desc: "Set the energy surplus cap. Energy above this will be sold for Trade Value.\n\n§YCurrent maximum:§! [Root.GetVariable|st_energy_max]\n§LClick to cycle to next tier.§!"
